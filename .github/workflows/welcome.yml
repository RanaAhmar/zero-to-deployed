name: Welcome Message

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const isIssue = !!context.payload.issue;
            const author = isIssue ? context.payload.issue.user.login : context.payload.pull_request.user.login;
            const body = `## 🌟 Welcome to the Stackaura Ecosystem, @${author}!

            Thank you for reaching out and contributing to our open-source journey. We appreciate your interest in this project!

            ### 🚀 What is Stackaura?
            Stackaura is a collection of high-performance tools, boilerplates, and automated solutions designed to empower developers.

            ### 🔗 Next Steps:
            - **Explore more:** Check out our [other projects](https://github.com/RanaAhmar?tab=repositories).
            - **Support us:** If you like what we do, please consider giving this repo a star! ⭐
            - **Stay connected:** Follow us for daily coding tips and updates.

            We will review your contribution/issue as soon as possible. Happy coding! 🤖`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
